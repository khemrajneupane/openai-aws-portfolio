name: CI - Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent duplicate runs on same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # future-proof: allows easy expansion

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run lint (optional but recommended)
        run: npm run lint

      - name: 🧪 Run tests
        run: npm test --if-present

      - name: 🏗️ Build Next.js app
        run: npm run build

      - name: ✅ Build success
        run: echo "Build completed successfully!"
